# News ingestion for digest + breaking pipelines (fetch.ts).
# Toggle `enabled` per source without code changes.

sources:
  - id: reuters-google
    type: rss
    enabled: true
    url: 'https://news.google.com/rss/search?q=site:reuters.com&hl=en-US&gl=US&ceid=US:en'
    label: Reuters

  - id: bbc-world
    type: rss
    enabled: false
    url: https://feeds.bbci.co.uk/news/world/rss.xml
    label: BBC

  - id: ap
    type: rss
    enabled: false
    url: https://rss.app/feeds/v1.1/tAjLcDBcVDkSVOUI.xml
    label: AP

  - id: techcrunch
    type: rss
    enabled: false
    url: https://techcrunch.com/feed/
    label: TechCrunch

  - id: bloomberg
    type: rss
    enabled: false
    url: https://feeds.bloomberg.com/markets/news.rss
    label: Bloomberg

  - id: wsj
    type: rss
    enabled: false
    url: https://feeds.content.dowjones.io/public/rss/mw_topstories
    label: WSJ

  - id: x-search
    type: x
    enabled: false
    query: '(news OR breaking OR update OR analysis) lang:en -filter:replies -filter:quote min_faves:50'
    max_results: 20
    since_days: 1
